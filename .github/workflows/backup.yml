name: Daily Neon backup

# Dumps everything in Neon to ./backups/ and commits the changes.
# Runs every day at 06:00 UTC, and on demand via the Actions tab.
#
# Setup (one-time):
#   1. GitHub → repo → Settings → Secrets and variables → Actions → New secret
#   2. Name: NEON_DATABASE_URL
#   3. Value: same URL you have in .env (the pooled connection string)
#   4. Save. The workflow will start picking it up on the next run.

on:
  schedule:
    - cron: "0 6 * * 0"        # Sunday 06:00 UTC
  workflow_dispatch:            # manual trigger from the Actions tab

permissions:
  contents: write               # needed to commit the backup back to the repo

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install "psycopg[binary]>=3.2.0" pandas openpyxl streamlit

      - name: Run backup
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python scripts/backup.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "backup: weekly snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
